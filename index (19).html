<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b141c">
<title>Synva</title>
<style>

  /* ==========================================================================
     1. ДИЗАЙН-ТОКЕНЫ (CSS-переменные)
     Тема-независимые токены — в :root.
     Тема-зависимые (цвета) — в [data-theme="dark"/"light"].
     ========================================================================== */

  :root {
    /* Шрифты */
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

    --fs-xs: 12px;
    --fs-sm: 13px;
    --fs-md: 15px;
    --fs-lg: 18px;
    --fs-xl: 24px;
    --fs-2xl: 32px;

    --fw-regular: 400;
    --fw-medium: 500;
    --fw-semibold: 600;
    --fw-bold: 700;

    /* Отступы */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 48px;

    /* Скругления */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-full: 999px;

    /* Анимации */
    --transition-fast: 120ms ease;
    --transition-base: 220ms ease;

    /* Фирменный градиент (бренд Synva) */
    --gradient-brand: linear-gradient(135deg, #0b1b2b 0%, #0e7c9b 55%, #14b8a6 100%);

    /* Геометрия макета */
    --header-height: 60px;
    --sidebar-width: 320px;
  }

  [data-theme="dark"] {
    --color-bg: #0b141c;
    --color-surface: #101c26;
    --color-surface-raised: #17232e;
    --color-border: #223140;
    --color-text: #e7edf1;
    --color-text-muted: #7e93a3;
    --color-accent: #14b8a6;
    --color-accent-strong: #0e7c9b;
    --color-accent-contrast: #06121a;
    --color-danger: #f87171;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.30);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  [data-theme="light"] {
    --color-bg: #f4f7f8;
    --color-surface: #ffffff;
    --color-surface-raised: #ffffff;
    --color-border: #dfe6ea;
    --color-text: #10202b;
    --color-text-muted: #5c7282;
    --color-accent: #0e7c9b;
    --color-accent-strong: #14b8a6;
    --color-accent-contrast: #ffffff;
    --color-danger: #dc2626;
    --shadow-sm: 0 1px 2px rgba(16, 32, 43, 0.06);
    --shadow-md: 0 8px 24px rgba(16, 32, 43, 0.08);
  }

  /* ==========================================================================
     2. RESET
     ========================================================================== */

  *, *::before, *::after { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: var(--font-sans);
    font-size: var(--fs-md);
    color: var(--color-text);
    background: var(--color-bg);
    -webkit-font-smoothing: antialiased;
    transition: background-color var(--transition-base), color var(--transition-base);
  }

  button { font: inherit; color: inherit; }

  button:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  /* Атрибут hidden должен побеждать любые display-правила классов —
     иначе, например, .auth-form{display:flex} перекроет [hidden] браузера */
  [hidden] { display: none !important; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  /* ==========================================================================
     3. ОБЩИЙ КАРКАС ПРИЛОЖЕНИЯ
     ========================================================================== */

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-height);
    padding: 0 var(--space-5);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }

  .app-header__brand {
    font-size: var(--fs-lg);
    font-weight: var(--fw-bold);
    letter-spacing: -0.02em;
    background: var(--gradient-brand);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .app-header__nav {
    display: flex;
    gap: var(--space-2);
  }

  .nav-btn {
    padding: var(--space-2) var(--space-4);
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    border-radius: var(--radius-full);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    transition: background var(--transition-fast), color var(--transition-fast);
  }

  .nav-btn:hover { background: var(--color-surface-raised); color: var(--color-text); }

  .nav-btn.is-active { background: var(--color-accent); color: var(--color-accent-contrast); }

  .theme-toggle {
    width: 36px;
    height: 36px;
    border: 1px solid var(--color-border);
    background: var(--color-surface-raised);
    border-radius: var(--radius-full);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--fs-md);
    transition: border-color var(--transition-fast);
  }

  .theme-toggle:hover { border-color: var(--color-accent); }

  .app-main {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ==========================================================================
     4. ЭКРАНЫ (screens)
     Каждый экран — блок верхнего уровня, видимость переключается классом.
     ========================================================================== */

  .screen {
    display: none;
    height: 100%;
  }

  .screen.screen--active {
    display: flex;
    animation: screen-in var(--transition-base);
  }

  @keyframes screen-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* -- Экран авторизации -- */

  #screen-auth {
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
  }

  .auth-card {
    width: 100%;
    max-width: 360px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-md);
  }

  .auth-card__brand {
    font-size: var(--fs-xl);
    font-weight: var(--fw-bold);
    letter-spacing: -0.02em;
    text-align: center;
    margin: 0 0 var(--space-5);
    background: var(--gradient-brand);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .auth-tabs {
    display: flex;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 4px;
    margin-bottom: var(--space-5);
  }

  .auth-tab {
    flex: 1;
    border: none;
    background: transparent;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-full);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    color: var(--color-text-muted);
    transition: background var(--transition-fast), color var(--transition-fast);
  }

  .auth-tab.is-active { background: var(--color-accent); color: var(--color-accent-contrast); }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .field__label {
    font-size: var(--fs-sm);
    color: var(--color-text-muted);
  }

  .field input {
    font: inherit;
    color: var(--color-text);
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    padding: var(--space-3);
    transition: border-color var(--transition-fast);
  }

  .field input:focus {
    outline: none;
    border-color: var(--color-accent);
  }

  .field input:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  .auth-error {
    margin: 0;
    min-height: 1em;
    font-size: var(--fs-sm);
    color: var(--color-danger);
  }

  .btn-primary {
    border: none;
    background: var(--gradient-brand);
    color: #ffffff;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-sm);
    font-size: var(--fs-md);
    font-weight: var(--fw-semibold);
    cursor: pointer;
    transition: opacity var(--transition-fast);
  }

  .btn-primary:hover { opacity: 0.9; }

  /* -- Экран чатов -- */

  .chats-layout {
    display: flex;
    width: 100%;
    height: 100%;
  }

  /* Иконочные кнопки — переиспользуются в сайдбаре, топбаре, композере */
  .icon-btn {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-muted);
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast);
  }

  .icon-btn:hover { background: var(--color-surface-raised); color: var(--color-text); }

  .icon-btn svg { width: 20px; height: 20px; }

  /* Аватар с инициалами — цвет задаётся инлайн для каждого чата */
  .avatar {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: var(--fw-semibold);
    font-size: var(--fs-md);
    color: #ffffff;
    flex-shrink: 0;
    user-select: none;
  }

  .avatar--sm { width: 40px; height: 40px; font-size: var(--fs-sm); }

  .avatar--lg { width: 88px; height: 88px; font-size: var(--fs-xl); }

  /* -- Левая колонка: список чатов -- */

  .chats-sidebar {
    position: relative;
    width: var(--sidebar-width);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--color-border);
    background: var(--color-surface);
    overflow: hidden;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-3);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }

  .search-field {
    flex: 1;
    display: flex;
    align-items: center;
    gap: var(--space-2);
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: var(--space-2) var(--space-3);
    transition: border-color var(--transition-fast);
  }

  .search-field:focus-within { border-color: var(--color-accent); }

  .search-field svg { width: 16px; height: 16px; color: var(--color-text-muted); flex-shrink: 0; }

  .search-field input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    outline: none;
    font: inherit;
    color: var(--color-text);
  }

  .search-field input::placeholder { color: var(--color-text-muted); }

  /* Выпадающее меню приложения (гамбургер) */
  .app-menu {
    position: absolute;
    top: 60px;
    left: var(--space-3);
    z-index: 20;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: var(--space-2);
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    transform-origin: top left;
    animation: menu-in var(--transition-fast);
  }

  @keyframes menu-in {
    from { opacity: 0; transform: scale(0.95) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .app-menu__item {
    border: none;
    background: transparent;
    text-align: left;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
    color: var(--color-text);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .app-menu__item:hover { background: var(--color-bg); }

  .app-menu__item--danger { color: var(--color-danger); }

  .chat-list {
    flex: 1;
    overflow-y: auto;
  }

  .chat-item-wrap {
    display: flex;
    align-items: center;
    border-left: 3px solid transparent;
    transition: background var(--transition-fast), border-color var(--transition-fast);
  }

  .chat-item-wrap:hover { background: var(--color-surface-raised); }

  .chat-item-wrap.is-active { background: var(--color-surface-raised); border-left-color: var(--color-accent); }

  .chat-item {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-2) var(--space-3) var(--space-4);
    border: none;
    background: transparent;
    font: inherit;
    color: inherit;
    text-align: left;
    cursor: pointer;
  }

  .chat-item__menu-btn {
    margin-right: var(--space-2);
    color: var(--color-text-muted);
    opacity: 0.7;
  }

  .chat-item__menu-btn:hover { opacity: 1; }

  .chat-item__pin { margin-right: 4px; }

  .chat-item__body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-item__row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
  }

  .chat-item__name {
    font-weight: var(--fw-medium);
    font-size: var(--fs-md);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-item__time { font-size: var(--fs-xs); color: var(--color-text-muted); flex-shrink: 0; }

  .chat-item__preview {
    font-size: var(--fs-sm);
    color: var(--color-text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-item__badge {
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: var(--radius-full);
    background: var(--color-accent);
    color: var(--color-accent-contrast);
    font-size: 11px;
    font-weight: var(--fw-semibold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Контекстное меню отдельного чата (закрепить/удалить) — один элемент
     на всё приложение, переиспользуется и позиционируется под нужной кнопкой */
  .chat-context-menu {
    position: fixed;
    z-index: 40;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: var(--space-2);
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    animation: menu-in var(--transition-fast);
  }

  .chat-context-menu__item {
    border: none;
    background: transparent;
    text-align: left;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
    color: var(--color-text);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .chat-context-menu__item:hover { background: var(--color-bg); }

  .chat-context-menu__item--danger { color: var(--color-danger); }

  /* Модальное окно создания чата */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: var(--space-4);
    animation: overlay-in var(--transition-fast);
  }

  @keyframes overlay-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    width: 100%;
    max-width: 360px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-md);
    animation: modal-in var(--transition-base);
  }

  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal__title {
    margin: 0 0 var(--space-4);
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
  }

  .modal__actions {
    display: flex;
    justify-content: flex-end;
    gap: var(--space-2);
    margin-top: var(--space-2);
  }

  /* -- Правая часть: окно диалога -- */

  .chats-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--color-bg);
  }

  .chat-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-6);
    color: var(--color-text-muted);
    text-align: center;
  }

  .chat-placeholder__icon {
    font-size: 48px;
    opacity: 0.6;
  }

  .chat-window {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .chat-topbar {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    height: var(--header-height);
    padding: 0 var(--space-4);
    border-bottom: 1px solid var(--color-border);
    background: var(--color-surface);
    flex-shrink: 0;
  }

  .chat-topbar__back { display: none; }

  .chat-topbar__info {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .chat-topbar__text { min-width: 0; display: flex; flex-direction: column; }

  .chat-topbar__name {
    font-weight: var(--fw-semibold);
    font-size: var(--fs-md);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-topbar__status { font-size: var(--fs-xs); color: var(--color-text-muted); }

  .chat-topbar__actions { display: flex; gap: var(--space-1); flex-shrink: 0; }

  .messages-window {
    flex: 1;
    overflow-y: auto;
    padding: var(--space-5) var(--space-6);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .message {
    display: flex;
    align-items: flex-end;
    gap: var(--space-1);
    max-width: 65%;
    animation: message-in var(--transition-base);
  }

  .message--in { align-self: flex-start; }

  .message--out { align-self: flex-end; flex-direction: row-reverse; }

  @keyframes message-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message__menu-btn {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
  }

  .message__menu-btn svg { width: 16px; height: 16px; }

  .message:hover .message__menu-btn,
  .message__menu-btn:focus-visible { opacity: 1; }

  @media (hover: none) {
    .message__menu-btn { opacity: 0.6; }
  }

  .message__bubble {
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }

  .message--in .message__bubble {
    background: var(--color-surface-raised);
    border-bottom-left-radius: 4px;
  }

  .message--out .message__bubble {
    background: var(--gradient-brand);
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message__reply {
    padding: 2px var(--space-2);
    margin-bottom: var(--space-1);
    border-left: 2px solid currentColor;
    opacity: 0.75;
    font-size: var(--fs-sm);
    word-break: break-word;
  }

  .message__text {
    margin: 0;
    font-size: var(--fs-md);
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message__time {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    opacity: 0.7;
    text-align: right;
  }

  .composer-context {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    border-top: 1px solid var(--color-border);
    border-left: 3px solid var(--color-accent);
    background: var(--color-surface);
    flex-shrink: 0;
  }

  .composer-context__body { min-width: 0; display: flex; flex-direction: column; }

  .composer-context__label {
    font-size: var(--fs-xs);
    color: var(--color-accent);
    font-weight: var(--fw-medium);
  }

  .composer-context__text {
    font-size: var(--fs-sm);
    color: var(--color-text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .message-composer {
    display: flex;
    align-items: flex-end;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    border-top: 1px solid var(--color-border);
    background: var(--color-surface);
    flex-shrink: 0;
  }

  .message-composer__input {
    flex: 1;
    resize: none;
    max-height: 120px;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    color: var(--color-text);
    font: inherit;
    line-height: 1.4;
    border-radius: var(--radius-lg);

<script>
(function () {
  'use strict';

  /* ============================================================================
     SYNVA — АРХИТЕКТУРА ПРИЛОЖЕНИЯ
     ----------------------------------------------------------------------------
     Модули: DB, Auth, UI, Chats, Settings, App.
     Каждый модуль — самостоятельный IIFE с публичным API (revealing module
     pattern). Модули общаются друг с другом только через публичные методы,
     напрямую в localStorage лезет только DB.

     Порядок инициализации задаёт App.init():
       DB → UI → Settings → Chats → Auth → маршрутизация экрана.

     Это фундамент. Создание чатов и отправка сообщений на этом этапе не
     реализуются — список чатов и диалог показывают демо-данные, только
     чтобы продемонстрировать интерфейс.
     ============================================================================ */


  /* ============================================================================
     МОДУЛЬ: DB
     Единая точка доступа к localStorage. Остальные модули не обращаются
     к localStorage напрямую — только через методы DB.
     ============================================================================ */

  const DB = (function () {
    const PREFIX = 'synva_';
    const SCHEMA_VERSION = 2;

    // Коллекции: списки записей, каждая запись имеет уникальный id.
    // Работают через универсальные create/read/update/delete.
    const COLLECTIONS = ['users', 'chats', 'messages', 'groups', 'channels'];

    // Синглтоны: один объект на ключ (не список записей).
    // Работают через универсальные save/load.
    const SINGLETONS = ['settings', 'session'];

    // Имена ключей без префикса — используются другими модулями,
    // чтобы не размазывать строковые литералы по коду.
    const KEYS = {
      VERSION: 'db_version',
      USERS: 'users',
      CHATS: 'chats',
      MESSAGES: 'messages',
      GROUPS: 'groups',
      CHANNELS: 'channels',
      SETTINGS: 'settings',
      SESSION: 'session'
    };

    function storageKey(key) {
      return PREFIX + key;
    }

    /* ---------- Генерация уникальных ID ---------- */
    // Временная метка (base36) + случайный суффикс — не требует внешних библиотек
    // и достаточно для локальной базы данных, где нет параллельной записи.
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
    }

    /* ---------- Низкоуровневые save/load: сырой доступ по ключу ---------- */
    // Используются коллекциями внутри, а также напрямую — для синглтонов
    // (settings, session) и любых будущих ключей.

    function save(key, value) {
      try {
        localStorage.setItem(storageKey(key), JSON.stringify(value));
        return true;
      } catch (err) {
        console.error('DB.save: не удалось сохранить "' + key + '"', err);
        return false;
      }
    }

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(storageKey(key));
        return raw === null ? (fallback !== undefined ? fallback : null) : JSON.parse(raw);
      } catch (err) {
        console.error('DB.load: не удалось прочитать "' + key + '"', err);
        return fallback !== undefined ? fallback : null;
      }
    }

    function remove(key) {
      localStorage.removeItem(storageKey(key));
    }

    function isCollection(name) {
      return COLLECTIONS.indexOf(name) !== -1;
    }

    /* ---------- Автосоздание базы при первом запуске ---------- */

    function defaultValue(key) {
      if (isCollection(key)) return [];
      if (key === KEYS.SETTINGS) return { theme: 'dark' };
      if (key === KEYS.SESSION) return { userId: null };
      if (key === KEYS.VERSION) return SCHEMA_VERSION;
      return null;
    }

    // Создаёт недостающие ключи в localStorage. Существующие данные не трогает.
    function init() {
      Object.keys(KEYS).forEach(function (name) {
        const key = KEYS[name];
        if (localStorage.getItem(storageKey(key)) === null) {
          save(key, defaultValue(key));
        }
      });
    }

    /* ---------- CRUD для коллекций (users, chats, messages, groups, channels) ---------- */

    function assertCollection(collection) {
      if (!isCollection(collection)) {
        console.error('DB: "' + collection + '" не является коллекцией. Доступны: ' + COLLECTIONS.join(', '));
        return false;
      }
      return true;
    }

    // Создать запись в коллекции. data — произвольные поля записи.
    // id/createdAt/updatedAt проставляются автоматически. Возвращает запись.
    function create(collection, data) {
      if (!assertCollection(collection)) return null;

      const items = load(collection, []);
      const now = Date.now();
      const record = Object.assign({}, data, {
        id: generateId(),
        createdAt: now,
        updatedAt: now
      });

      items.push(record);
      save(collection, items);
      return record;
    }

    // Прочитать запись по id. Если id не передан — вернуть всю коллекцию.
    function read(collection, id) {
      if (!assertCollection(collection)) return id === undefined ? [] : null;

      const items = load(collection, []);
      if (id === undefined) return items;
      return items.find(function (item) { return item.id === id; }) || null;
    }

    // Частично обновить запись по id. Возвращает обновлённую запись или null.
    function update(collection, id, patch) {
      if (!assertCollection(collection)) return null;

      const items = load(collection, []);
      const index = items.findIndex(function (item) { return item.id === id; });
      if (index === -1) return null;

      items[index] = Object.assign({}, items[index], patch, {
        id: items[index].id,
        updatedAt: Date.now()
      });
      save(collection, items);
      return items[index];
    }

    // Удалить запись по id. Возвращает true, если запись была найдена и удалена.
    function del(collection, id) {
      if (!assertCollection(collection)) return false;

      const items = load(collection, []);
      const next = items.filter(function (item) { return item.id !== id; });
      if (next.length === items.length) return false;

      save(collection, next);
      return true;
    }

    // Вспомогательный выборочный поиск внутри коллекции
    // (например, сообщения одного чата: DB.query('messages', m => m.chatId === id))
    function query(collection, predicate) {
      if (!assertCollection(collection)) return [];
      return load(collection, []).filter(predicate);
    }

    // Полностью очистить данные приложения (все ключи Synva)
    function clearAll() {
      Object.keys(KEYS).forEach(function (name) {
        remove(KEYS[name]);
      });
    }

    return {
      KEYS: KEYS,
      COLLECTIONS: COLLECTIONS,
      SINGLETONS: SINGLETONS,
      init: init,
      generateId: generateId,
      create: create,
      read: read,
      update: update,
      delete: del,
      save: save,
      load: load,
      remove: remove,
      query: query,
      clearAll: clearAll
    };
  })();


  /* ============================================================================
     МОДУЛЬ: Auth
     Регистрация, вход, выход, проверка авторизации и профиль пользователя
     (имя/username/аватар). Сессия хранится в синглтоне DB.KEYS.SESSION,
     сам пользователь — в коллекции DB.KEYS.USERS. Модуль также владеет
     DOM-элементами экрана авторизации и карточки профиля в настройках
     (по аналогии с тем, как Chats владеет списком чатов).
     ============================================================================ */

  const Auth = (function () {
    let elements = {};

    function init() {
      cacheElements();
      bindEvents();
      switchTab('login');
      renderProfileCard();
    }

    function cacheElements() {
      elements.tabs = document.querySelectorAll('[data-auth-tab]');
      elements.loginForm = document.getElementById('login-form');
      elements.registerForm = document.getElementById('register-form');
      elements.loginError = document.querySelector('[data-error-for="login"]');
      elements.registerError = document.querySelector('[data-error-for="register"]');

      elements.profileAvatar = document.getElementById('profile-avatar');
      elements.avatarUploadBtn = document.getElementById('avatar-upload-btn');
      elements.avatarRemoveBtn = document.getElementById('avatar-remove-btn');
      elements.avatarInput = document.getElementById('avatar-input');
      elements.profileForm = document.getElementById('profile-form');
      elements.profileNameInput = document.getElementById('profile-name-input');
      elements.profileUsernameInput = document.getElementById('profile-username-input');
      elements.profileMessage = document.getElementById('profile-message');
      elements.profileCreatedAt = document.getElementById('profile-created-at');
    }

    function bindEvents() {
      elements.tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          switchTab(tab.dataset.authTab);
        });
      });

      if (elements.loginForm) {
        elements.loginForm.addEventListener('submit', handleLoginSubmit);
      }
      if (elements.registerForm) {
        elements.registerForm.addEventListener('submit', handleRegisterSubmit);
      }

      if (elements.avatarUploadBtn) {
        elements.avatarUploadBtn.addEventListener('click', function () {
          elements.avatarInput.click();
        });
      }
      if (elements.avatarInput) {
        elements.avatarInput.addEventListener('change', handleAvatarChange);
      }
      if (elements.avatarRemoveBtn) {
        elements.avatarRemoveBtn.addEventListener('click', handleAvatarRemove);
      }
      if (elements.profileForm) {
        elements.profileForm.addEventListener('submit', handleProfileSubmit);
      }
    }

    // Переключить вкладку "Вход" / "Регистрация" внутри экрана авторизации
    function switchTab(name) {
      elements.tabs.forEach(function (tab) {
        tab.classList.toggle('is-active', tab.dataset.authTab === name);
      });
      elements.loginForm.hidden = name !== 'login';
      elements.registerForm.hidden = name !== 'register';
      clearErrors();
    }

    function clearErrors() {
      if (elements.loginError) elements.loginError.textContent = '';
      if (elements.registerError) elements.registerError.textContent = '';
    }

    function handleLoginSubmit(event) {
      event.preventDefault();
      const data = new FormData(elements.loginForm);
      const result = login({
        username: data.get('username'),
        password: data.get('password')
      });

      if (!result.success) {
        elements.loginError.textContent = result.error;
        return;
      }

      elements.loginForm.reset();
      onAuthSuccess();
    }

    function handleRegisterSubmit(event) {
      event.preventDefault();
      const data = new FormData(elements.registerForm);
      const result = register({
        name: data.get('name'),
        username: data.get('username'),
        password: data.get('password')
      });

      if (!result.success) {
        elements.registerError.textContent = result.error;
        return;
      }

      elements.registerForm.reset();
      onAuthSuccess();
    }

    // Общий шаг после успешного входа/регистрации — открыть главное окно
    function onAuthSuccess() {
      UI.refreshProfile();
      renderProfileCard();
      UI.showScreen('chats');
    }

    /* ---------- Сессия ---------- */

    function getSession() {
      return DB.load(DB.KEYS.SESSION, { userId: null });
    }

    function isAuthenticated() {
      return getSession().userId !== null;
    }

    function getCurrentUser() {
      const session = getSession();
      if (!session.userId) return null;
      return DB.read(DB.KEYS.USERS, session.userId);
    }

    /* ---------- Пользователи ---------- */

    function normalizeUsername(username) {
      return String(username || '').trim().toLowerCase();
    }

    function findUserByUsername(username) {
      const normalized = normalizeUsername(username);
      const matches = DB.query(DB.KEYS.USERS, function (u) {
        return normalizeUsername(u.username) === normalized;
      });
      return matches[0] || null;
    }

    // Регистрация: создаёт профиль пользователя и сразу открывает сессию
    function register(payload) {
      const name = String((payload && payload.name) || '').trim();
      const username = String((payload && payload.username) || '').trim();
      const password = String((payload && payload.password) || '');

      if (!name) return { success: false, error: 'Введите имя' };
      if (!username) return { success: false, error: 'Введите username' };
      if (password.length < 4) return { success: false, error: 'Пароль должен быть не короче 4 символов' };
      if (findUserByUsername(username)) return { success: false, error: 'Этот username уже занят' };

      const salt = DB.generateId();
      const user = DB.create(DB.KEYS.USERS, {
        name: name,
        username: username,
        salt: salt,
        passwordHash: hashPassword(password, salt)
      });

      DB.save(DB.KEYS.SESSION, { userId: user.id });
      return { success: true, user: user };
    }

    // Вход: проверяет username/пароль и открывает сессию
    function login(payload) {
      const username = String((payload && payload.username) || '').trim();
      const password = String((payload && payload.password) || '');

      const user = findUserByUsername(username);
      const validPassword = user && user.passwordHash === hashPassword(password, user.salt);

      if (!validPassword) {
        return { success: false, error: 'Неверный username или пароль' };
      }

      DB.save(DB.KEYS.SESSION, { userId: user.id });
      return { success: true, user: user };
    }

    // Выход: сбрасывает сессию и возвращает на экран авторизации
    function logout() {
      DB.save(DB.KEYS.SESSION, { userId: null });
      UI.refreshProfile();
      renderProfileCard();
      UI.showScreen('auth');
    }

    /* ---------- Хеширование пароля ----------
       Простой синхронный хеш с солью — только для локальной демонстрации
       архитектуры (не хранить пароль в открытом виде). Это НЕ криптографически
       стойкий алгоритм: в реальном продукте проверка пароля должна
       происходить на сервере (bcrypt/argon2 и т.п.).
    */
    function hashPassword(password, salt) {
      const input = salt + ':' + password;
      let h1 = 0;
      let h2 = 0;
      for (let i = 0; i < input.length; i++) {
        const code = input.charCodeAt(i);
        h1 = ((h1 << 5) - h1 + code) | 0;
        h2 = ((h2 << 3) + h2 + code) | 0;
      }
      return (h1 >>> 0).toString(36) + (h2 >>> 0).toString(36);
    }

    /* ---------- Профиль: имя, username, аватар ----------
       Единая точка изменения данных текущего пользователя. После успешного
       обновления сама же обновляет все места приложения, где показан
       профиль (карточка в настройках + строка с итогом в settings-row).
    */
    function updateProfile(patch) {
      const user = getCurrentUser();
      if (!user) return { success: false, error: 'Нет активной сессии' };

      const updates = {};

      if (patch.name !== undefined) {
        const name = String(patch.name).trim();
        if (!name) return { success: false, error: 'Введите имя' };
        updates.name = name;
      }

      if (patch.username !== undefined) {
        const username = String(patch.username).trim();
        if (!username) return { success: false, error: 'Введите username' };
        const existing = findUserByUsername(username);
        if (existing && existing.id !== user.id) return { success: false, error: 'Этот username уже занят' };
        updates.username = username;
      }

      if (patch.avatar !== undefined) {
        updates.avatar = patch.avatar; // base64-строка или null для удаления
      }

      const updated = DB.update(DB.KEYS.USERS, user.id, updates);

      UI.refreshProfile();
      renderProfileCard();

      return { success: true, user: updated };
    }

    function handleProfileSubmit(event) {
      event.preventDefault();
      const data = new FormData(elements.profileForm);
      const result = updateProfile({
        name: data.get('name'),
        username: data.get('username')
      });

      showProfileMessage(result.success ? 'Изменения сохранены' : result.error, result.success);
    }

    function handleAvatarChange(event) {
      const file = event.target.files && event.target.files[0];
      event.target.value = ''; // разрешить повторный выбор того же файла

      if (!file) return;

      readAvatarFile(file).then(function (dataUrl) {
        const result = updateProfile({ avatar: dataUrl });
        showProfileMessage(result.success ? 'Аватар обновлён' : result.error, result.success);
      }).catch(function (err) {
        showProfileMessage(err.message, false);
      });
    }

    function handleAvatarRemove() {
      const result = updateProfile({ avatar: null });
      showProfileMessage(result.success ? 'Аватар удалён' : result.error, result.success);
    }

    function showProfileMessage(text, isSuccess) {
      if (!elements.profileMessage) return;
      elements.profileMessage.textContent = text;
      elements.profileMessage.classList.toggle('is-success', !!isSuccess);
    }

    // Читает файл изображения и сжимает его до компактного base64 (JPEG,
    // не длиннее 256px по большей стороне) — чтобы не раздувать localStorage.
    function readAvatarFile(file) {
      return new Promise(function (resolve, reject) {
        if (file.type.indexOf('image/') !== 0) {
          reject(new Error('Выберите файл изображения'));
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          reject(new Error('Файл слишком большой (максимум 5 МБ)'));
          return;
        }

        const reader = new FileReader();
        reader.onload = function () {
          const img = new Image();
          img.onload = function () {
            try {
              resolve(resizeImageToDataUrl(img));
            } catch (err) {
              reject(new Error('Не удалось обработать изображение'));
            }
          };
          img.onerror = function () { reject(new Error('Не удалось прочитать изображение')); };
          img.src = reader.result;
        };
        reader.onerror = function () { reject(new Error('Не удалось прочитать файл')); };
        reader.readAsDataURL(file);
      });
    }

    function resizeImageToDataUrl(img) {
      const MAX_SIDE = 256;
      const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
      const width = Math.round(img.width * scale);
      const height = Math.round(img.height * scale);

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);

      return canvas.toDataURL('image/jpeg', 0.85);
    }

    /* ---------- Отображение профиля ---------- */

    function getInitials(name) {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '?';
      const first = parts[0].charAt(0);
      const second = parts.length > 1 ? parts[1].charAt(0) : '';
      return (first + second).toUpperCase();
    }

    // Стабильный цвет для инициалов — вычисляется из username/имени,
    // не хранится в записи пользователя.
    function colorFromString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return 'hsl(' + (Math.abs(hash) % 360) + ', 65%, 45%)';
    }

    function formatDate(timestamp) {
      if (!timestamp) return '—';
      return new Date(timestamp).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Перерисовать карточку профиля в настройках по текущей сессии
    function renderProfileCard() {
      if (!elements.profileAvatar) return;

      const user = getCurrentUser();

      if (user && user.avatar) {
        elements.profileAvatar.style.background = '';
        elements.profileAvatar.style.backgroundImage = 'url(' + user.avatar + ')';
        elements.profileAvatar.style.backgroundSize = 'cover';
        elements.profileAvatar.style.backgroundPosition = 'center';
        elements.profileAvatar.textContent = '';
      } else if (user) {
        elements.profileAvatar.style.backgroundImage = '';
        elements.profileAvatar.style.background = colorFromString(user.username || user.name);
        elements.profileAvatar.textContent = getInitials(user.name);
      } else {
        elements.profileAvatar.style.backgroundImage = '';
        elements.profileAvatar.style.background = 'var(--color-surface-raised)';
        elements.profileAvatar.textContent = '';
      }

      if (elements.avatarRemoveBtn) elements.avatarRemoveBtn.hidden = !(user && user.avatar);
      if (elements.profileNameInput) elements.profileNameInput.value = user ? user.name : '';
      if (elements.profileUsernameInput) elements.profileUsernameInput.value = user ? user.username : '';
      if (elements.profileCreatedAt) elements.profileCreatedAt.textContent = user ? formatDate(user.createdAt) : '—';
      showProfileMessage('', false);
    }

    return {
      init: init,
      isAuthenticated: isAuthenticated,
      getCurrentUser: getCurrentUser,
      register: register,
      login: login,
      logout: logout,
      updateProfile: updateProfile
    };
  })();


  /* ============================================================================
     МОДУЛЬ: UI
     Общие функции интерфейса: переключение экранов, применение темы,
     привязка глобальных обработчиков (навигация, тема).
     ============================================================================ */

  const UI = (function () {
    let currentScreen = null;
    let elements = {};

    function init() {
      cacheElements();
      bindEvents();
      refreshProfile();
    }

    function cacheElements() {
      elements.screens = document.querySelectorAll('.screen');
      elements.navButtons = document.querySelectorAll('[data-nav]');
      elements.themeToggle = document.getElementById('theme-toggle');
      elements.settingsThemeBtn = document.getElementById('settings-theme-btn');
      elements.profileSummary = document.getElementById('profile-summary');
      elements.logoutBtn = document.getElementById('logout-btn');
    }

    function bindEvents() {
      elements.navButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          showScreen(btn.dataset.nav);
        });
      });

      if (elements.themeToggle) {
        elements.themeToggle.addEventListener('click', Settings.toggleTheme);
      }
      if (elements.settingsThemeBtn) {
        elements.settingsThemeBtn.addEventListener('click', Settings.toggleTheme);
      }
      if (elements.logoutBtn) {
        elements.logoutBtn.addEventListener('click', function () {
          Auth.logout();
        });
      }
    }

    // Переключить видимый экран по имени ('auth' | 'chats' | 'settings')
    function showScreen(name) {
      currentScreen = name;

      elements.screens.forEach(function (screen) {
        screen.classList.toggle('screen--active', screen.id === 'screen-' + name);
      });

      elements.navButtons.forEach(function (btn) {
        btn.classList.toggle('is-active', btn.dataset.nav === name);
      });
    }

    function getCurrentScreen() {
      return currentScreen;
    }

    // Применить тему оформления ('dark' | 'light')
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
    }

    // Обновить строку профиля в настройках по текущей сессии (Auth)
    function refreshProfile() {
      if (!elements.profileSummary) return;
      const user = Auth.getCurrentUser();
      elements.profileSummary.textContent = user
        ? user.name + ' (@' + user.username + ')'
        : 'Вы не авторизованы';
    }

    return {
      init: init,
      showScreen: showScreen,
      getCurrentScreen: getCurrentScreen,
      applyTheme: applyTheme,
      refreshProfile: refreshProfile
    };
  })();


  /* ============================================================================
     МОДУЛЬ: Chats
     Личные чаты (создание, список, открытие, закрепление, удаление, поиск)
     и сообщения внутри диалога (отправка, редактирование, удаление, ответ,
     копирование). Всё читается и пишется через DB (коллекции 'chats' и
     'messages'). У локального мессенджера нет второго собеседника, поэтому
     все отправленные сообщения — от текущего пользователя (fromMe: true);
     поле готово к тому, что входящие сообщения появятся в будущем без
     переделки рендера.
     ============================================================================ */

  const Chats = (function () {
    let elements = {};
    let activeChatId = null;
    let contextMenuChatId = null;
    let contextMenuMessageId = null;
    let composerMode = null; // null | 'reply' | 'edit'
    let composerTargetId = null;

    function init() {
      cacheElements();
      bindEvents();
      render();
    }

    function cacheElements() {
      elements.layout = document.querySelector('.chats-layout');
      elements.list = document.getElementById('chat-list');
      elements.searchInput = document.getElementById('chat-search');
      elements.placeholder = document.getElementById('chat-placeholder');
      elements.window = document.getElementById('chat-window');
      elements.topbarAvatar = document.getElementById('chat-topbar-avatar');
      elements.topbarName = document.getElementById('chat-topbar-name');
      elements.messagesWindow = document.getElementById('messages-window');
      elements.composer = document.getElementById('message-composer');
      elements.input = document.getElementById('message-input');
      elements.backBtn = document.getElementById('chat-back-btn');
      elements.menuBtn = document.getElementById('app-menu-btn');
      elements.menu = document.getElementById('app-menu');

      elements.newChatBtn = document.getElementById('new-chat-btn');
      elements.newChatModal = document.getElementById('new-chat-modal');
      elements.newChatForm = document.getElementById('new-chat-form');
      elements.newChatNameInput = document.getElementById('new-chat-name-input');
      elements.newChatError = document.getElementById('new-chat-error');
      elements.newChatCancelBtn = document.getElementById('new-chat-cancel-btn');

      elements.chatContextMenu = document.getElementById('chat-context-menu');
      elements.chatMenuPinBtn = document.getElementById('chat-menu-pin-btn');
      elements.chatMenuDeleteBtn = document.getElementById('chat-menu-delete-btn');

      elements.messageContextMenu = document.getElementById('message-context-menu');
      elements.messageMenuReplyBtn = document.getElementById('message-menu-reply-btn');
      elements.messageMenuCopyBtn = document.getElementById('message-menu-copy-btn');
      elements.messageMenuEditBtn = document.getElementById('message-menu-edit-btn');
      elements.messageMenuDeleteBtn = document.getElementById('message-menu-delete-btn');

      elements.composerContext = document.getElementById('composer-context');
      elements.composerContextLabel = document.getElementById('composer-context-label');
      elements.composerContextText = document.getElementById('composer-context-text');
      elements.composerContextCancelBtn = document.getElementById('composer-context-cancel-btn');
    }

    function bindEvents() {
      if (elements.backBtn) {
        elements.backBtn.addEventListener('click', closeChatOnMobile);
      }

      if (elements.composer) {
        elements.composer.addEventListener('submit', handleComposerSubmit);
      }

      if (elements.input) {
        elements.input.addEventListener('input', function () {
          elements.input.style.height = 'auto';
          elements.input.style.height = Math.min(elements.input.scrollHeight, 120) + 'px';
        });

        // Enter отправляет сообщение, Shift+Enter — перенос строки
        elements.input.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            handleComposerSubmit({ preventDefault: function () {} });
          }
        });
      }

      if (elements.composerContextCancelBtn) {
        elements.composerContextCancelBtn.addEventListener('click', cancelComposerContext);
      }

      if (elements.menuBtn) {
        elements.menuBtn.addEventListener('click', function (event) {
          event.stopPropagation();
          toggleAppMenu();
        });
      }

      if (elements.menu) {
        elements.menu.addEventListener('click', function (event) {
          const item = event.target.closest('[data-menu-action]');
          if (item) handleMenuAction(item.dataset.menuAction);
        });
      }

      if (elements.searchInput) {
        elements.searchInput.addEventListener('input', render);
      }

      if (elements.newChatBtn) {
        elements.newChatBtn.addEventListener('click', openNewChatModal);
      }
      if (elements.newChatCancelBtn) {
        elements.newChatCancelBtn.addEventListener('click', closeNewChatModal);
      }
      if (elements.newChatForm) {
        elements.newChatForm.addEventListener('submit', handleNewChatSubmit);
      }
      if (elements.newChatModal) {
        elements.newChatModal.addEventListener('click', function (event) {
          if (event.target === elements.newChatModal) closeNewChatModal();
        });
      }

      if (elements.chatMenuPinBtn) {
        elements.chatMenuPinBtn.addEventListener('click', function () {
          if (contextMenuChatId) togglePin(contextMenuChatId);
          closeChatMenu();
        });
      }
      if (elements.chatMenuDeleteBtn) {
        elements.chatMenuDeleteBtn.addEventListener('click', function () {
          if (contextMenuChatId) deleteChat(contextMenuChatId);
          closeChatMenu();
        });
      }

      if (elements.messageMenuReplyBtn) {
        elements.messageMenuReplyBtn.addEventListener('click', function () {
          if (contextMenuMessageId) startReply(contextMenuMessageId);
          closeMessageMenu();
        });
      }
      if (elements.messageMenuCopyBtn) {
        elements.messageMenuCopyBtn.addEventListener('click', function () {
          if (contextMenuMessageId) copyMessageText(contextMenuMessageId);
          closeMessageMenu();
        });
      }
      if (elements.messageMenuEditBtn) {
        elements.messageMenuEditBtn.addEventListener('click', function () {
          if (contextMenuMessageId) startEdit(contextMenuMessageId);
          closeMessageMenu();
        });
      }
      if (elements.messageMenuDeleteBtn) {
        elements.messageMenuDeleteBtn.addEventListener('click', function () {
          if (contextMenuMessageId) deleteMessage(contextMenuMessageId);
          closeMessageMenu();
        });
      }

      document.addEventListener('click', function () {
        closeAppMenu();
        closeChatMenu();
        closeMessageMenu();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closeNewChatModal();
          closeChatMenu();
          closeAppMenu();
          closeMessageMenu();
        }
      });
    }

    /* ---------- Меню сайдбара (гамбургер) ---------- */

    function toggleAppMenu() {
      if (!elements.menu) return;
      elements.menu.hidden = !elements.menu.hidden;
      elements.menuBtn.setAttribute('aria-expanded', String(!elements.menu.hidden));
    }

    function closeAppMenu() {
      if (!elements.menu || elements.menu.hidden) return;
      elements.menu.hidden = true;
      elements.menuBtn.setAttribute('aria-expanded', 'false');
    }

    function handleMenuAction(action) {
      closeAppMenu();
      if (action === 'settings') UI.showScreen('settings');
      if (action === 'theme') Settings.toggleTheme();
      if (action === 'logout') Auth.logout();
    }

    /* ---------- Мобильная навигация: список ↔ диалог ---------- */

    function closeChatOnMobile() {
      if (elements.layout) elements.layout.classList.remove('is-chat-open');
    }

    /* ---------- Создание чата ---------- */

    function openNewChatModal() {
      if (!elements.newChatModal) return;
      elements.newChatNameInput.value = '';
      elements.newChatError.textContent = '';
      elements.newChatModal.hidden = false;
      elements.newChatNameInput.focus();
    }

    function closeNewChatModal() {
      if (elements.newChatModal) elements.newChatModal.hidden = true;
    }

    function handleNewChatSubmit(event) {
      event.preventDefault();
      const name = elements.newChatNameInput.value.trim();
      if (!name) {
        elements.newChatError.textContent = 'Введите имя собеседника';
        return;
      }

      const chat = DB.create(DB.KEYS.CHATS, {
        name: name,
        pinned: false,
        lastMessageText: null,
        lastMessageAt: null
      });

      closeNewChatModal();
      render();
      openChat(chat.id);
    }

    /* ---------- Закрепление и удаление ---------- */

    function openChatMenu(chatId, buttonEl) {
      const chat = DB.read(DB.KEYS.CHATS, chatId);
      if (!chat || !elements.chatContextMenu) return;

      contextMenuChatId = chatId;
      elements.chatMenuPinBtn.textContent = chat.pinned ? 'Открепить чат' : 'Закрепить чат';

      const rect = buttonEl.getBoundingClientRect();
      elements.chatContextMenu.style.top = (rect.bottom + 4) + 'px';
      elements.chatContextMenu.style.left = Math.max(8, rect.right - 180) + 'px';
      elements.chatContextMenu.hidden = false;
    }

    function closeChatMenu() {
      if (!elements.chatContextMenu || elements.chatContextMenu.hidden) return;
      elements.chatContextMenu.hidden = true;
      contextMenuChatId = null;
    }

    function togglePin(chatId) {
      const chat = DB.read(DB.KEYS.CHATS, chatId);
      if (!chat) return;
      DB.update(DB.KEYS.CHATS, chatId, { pinned: !chat.pinned });
      render();
    }

    function deleteChat(chatId) {
      const chat = DB.read(DB.KEYS.CHATS, chatId);
      if (!chat) return;

      const confirmed = window.confirm('Удалить чат «' + chat.name + '»? Это действие нельзя отменить.');
      if (!confirmed) return;

      DB.delete(DB.KEYS.CHATS, chatId);
      DB.query(DB.KEYS.MESSAGES, function (m) { return m.chatId === chatId; }).forEach(function (m) {
        DB.delete(DB.KEYS.MESSAGES, m.id);
      });

      if (activeChatId === chatId) {
        activeChatId = null;
        if (elements.window) elements.window.hidden = true;
        if (elements.placeholder) elements.placeholder.hidden = false;
        cancelComposerContext();
        closeChatOnMobile();
      }

      render();
    }

    /* ---------- Данные ---------- */

    function getAll() {
      return DB.read(DB.KEYS.CHATS);
    }

    function getMessages(chatId) {
      return DB.query(DB.KEYS.MESSAGES, function (m) { return m.chatId === chatId; });
    }

    // Закреплённые чаты — сверху, остальные — по времени последнего
    // сообщения (или по дате создания, если сообщений ещё не было)
    function sortChats(chats) {
      return chats.slice().sort(function (a, b) {
        const pinDiff = (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
        if (pinDiff !== 0) return pinDiff;
        const aTime = a.lastMessageAt || a.createdAt || 0;
        const bTime = b.lastMessageAt || b.createdAt || 0;
        return bTime - aTime;
      });
    }

    /* ---------- Аватар по имени (инициалы + стабильный цвет) ---------- */

    function getInitials(name) {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '?';
      const first = parts[0].charAt(0);
      const second = parts.length > 1 ? parts[1].charAt(0) : '';
      return (first + second).toUpperCase();
    }

    function colorFromString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return 'hsl(' + (Math.abs(hash) % 360) + ', 65%, 45%)';
    }

    function formatChatTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const now = new Date();
      if (date.toDateString() === now.toDateString()) {
        return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      }
      return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    /* ---------- Рендер списка чатов ---------- */

    function render() {
      if (!elements.list) return;

      const query = String((elements.searchInput && elements.searchInput.value) || '').trim().toLowerCase();
      const all = getAll();
      const chats = sortChats(all).filter(function (chat) {
        return !query || chat.name.toLowerCase().indexOf(query) !== -1;
      });

      if (!chats.length) {
        const message = query ? 'Ничего не найдено' : 'Чатов пока нет — создайте первый';
        elements.list.innerHTML = '<p class="empty-state">' + escapeHtml(message) + '</p>';
        return;
      }

      elements.list.innerHTML = chats.map(renderChatItem).join('');

      elements.list.querySelectorAll('.chat-item').forEach(function (item) {
        item.addEventListener('click', function () {
          openChat(item.dataset.chatId);
        });
      });

      elements.list.querySelectorAll('.chat-item__menu-btn').forEach(function (btn) {
        btn.addEventListener('click', function (event) {
          event.stopPropagation();
          openChatMenu(btn.dataset.chatMenuId, btn);
        });
      });
    }

    function renderChatItem(chat) {
      const isActive = chat.id === activeChatId;
      const initials = getInitials(chat.name);
      const color = colorFromString(chat.name);
      const time = formatChatTime(chat.lastMessageAt || chat.createdAt);
      const preview = chat.lastMessageText || 'Нет сообщений';
      const pin = chat.pinned ? '<span class="chat-item__pin">📌</span>' : '';

      return (
        '<div class="chat-item-wrap' + (isActive ? ' is-active' : '') + '">' +
          '<button type="button" class="chat-item" data-chat-id="' + chat.id + '">' +
            '<div class="avatar" style="background:' + color + '">' + escapeHtml(initials) + '</div>' +
            '<div class="chat-item__body">' +
              '<div class="chat-item__row">' +
                '<span class="chat-item__name">' + pin + escapeHtml(chat.name) + '</span>' +
                '<span class="chat-item__time">' + escapeHtml(time) + '</span>' +
              '</div>' +
              '<div class="chat-item__row">' +
                '<span class="chat-item__preview">' + escapeHtml(preview) + '</span>' +
                (chat.unread ? '<span class="chat-item__badge">' + chat.unread + '</span>' : '') +
              '</div>' +
            '</div>' +
          '</button>' +
          '<button type="button" class="chat-item__menu-btn icon-btn" data-chat-menu-id="' + chat.id + '" aria-label="Меню чата">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>' +
          '</button>' +
        '</div>'
      );
    }

    /* ---------- Сообщения: отправка, редактирование, ответ, копирование, удаление ---------- */

    // Пересчитать превью последнего сообщения чата (для списка и сортировки)
    function syncChatPreview(chatId) {
      const messages = getMessages(chatId);
      const last = messages[messages.length - 1] || null;
      DB.update(DB.KEYS.CHATS, chatId, {
        lastMessageText: last ? last.text : null,
        lastMessageAt: last ? last.createdAt : null
      });
    }

    function handleComposerSubmit(event) {
      event.preventDefault();
      if (!activeChatId || !elements.input) return;

      const text = elements.input.value.trim();
      if (!text) return;

      if (composerMode === 'edit' && composerTargetId) {
        DB.update(DB.KEYS.MESSAGES, composerTargetId, { text: text, edited: true });
      } else {
        DB.create(DB.KEYS.MESSAGES, {
          chatId: activeChatId,
          text: text,
          fromMe: true,
          replyToId: composerMode === 'reply' ? composerTargetId : null
        });
      }

      syncChatPreview(activeChatId);
      cancelComposerContext();
      renderMessages(activeChatId);
      render();
    }

    function deleteMessage(messageId) {
      const message = DB.read(DB.KEYS.MESSAGES, messageId);
      if (!message) return;

      const confirmed = window.confirm('Удалить сообщение?');
      if (!confirmed) return;

      DB.delete(DB.KEYS.MESSAGES, messageId);
      syncChatPreview(message.chatId);

      if (composerTargetId === messageId) {
        cancelComposerContext();
      }

      renderMessages(message.chatId);
      render();
    }

    function startReply(messageId) {
      const message = DB.read(DB.KEYS.MESSAGES, messageId);
      if (!message) return;

      composerMode = 'reply';
      composerTargetId = messageId;
      showComposerContext('Ответ на сообщение', message.text);
      if (elements.input) elements.input.focus();
    }

    function startEdit(messageId) {
      const message = DB.read(DB.KEYS.MESSAGES, messageId);
      if (!message) return;

      composerMode = 'edit';
      composerTargetId = messageId;
      showComposerContext('Редактирование сообщения', message.text);

      if (elements.input) {
        elements.input.value = message.text;
        elements.input.style.height = 'auto';
        elements.input.style.height = Math.min(elements.input.scrollHeight, 120) + 'px';
        elements.input.focus();
      }
    }

    function showComposerContext(label, text) {
      if (!elements.composerContext) return;
      elements.composerContextLabel.textContent = label;
      elements.composerContextText.textContent = text;
      elements.composerContext.hidden = false;
    }

    function resetComposerContext() {
      composerMode = null;
      composerTargetId = null;
      if (elements.composerContext) elements.composerContext.hidden = true;
    }

    // Отмена ответа/редактирования — и панель, и введённый текст сбрасываются
    function cancelComposerContext() {
      resetComposerContext();
      if (elements.input) {
        elements.input.value = '';
        elements.input.style.height = 'auto';
      }
    }

    function copyMessageText(messageId) {
      const message = DB.read(DB.KEYS.MESSAGES, messageId);
      if (!message) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(message.text).catch(function () {
          fallbackCopyText(message.text);
        });
      } else {
        fallbackCopyText(message.text);
      }
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try { document.execCommand('copy'); } catch (err) { /* буфер обмена недоступен */ }
      document.body.removeChild(textarea);
    }

    /* ---------- Контекстное меню сообщения ---------- */

    function openMessageMenu(messageId, buttonEl) {
      const message = DB.read(DB.KEYS.MESSAGES, messageId);
      if (!message || !elements.messageContextMenu) return;

      contextMenuMessageId = messageId;
      elements.messageMenuEditBtn.hidden = !message.fromMe;
      elements.messageMenuDeleteBtn.hidden = !message.fromMe;

      const rect = buttonEl.getBoundingClientRect();
      elements.messageContextMenu.style.top = (rect.bottom + 4) + 'px';
      elements.messageContextMenu.style.left = Math.max(8, rect.right - 180) + 'px';
      elements.messageContextMenu.hidden = false;
    }

    function closeMessageMenu() {
      if (!elements.messageContextMenu || elements.messageContextMenu.hidden) return;
      elements.messageContextMenu.hidden = true;
      contextMenuMessageId = null;
    }

    /* ---------- Открытие диалога ---------- */

    function openChat(chatId) {
      const chat = DB.read(DB.KEYS.CHATS, chatId);
      if (!chat) return;

      activeChatId = chatId;
      cancelComposerContext();
      render();

      elements.placeholder.hidden = true;
      elements.window.hidden = false;

      elements.topbarAvatar.style.background = colorFromString(chat.name);
      elements.topbarAvatar.textContent = getInitials(chat.name);
      elements.topbarName.textContent = chat.name;

      renderMessages(chatId);

      if (elements.layout) elements.layout.classList.add('is-chat-open');
    }

    function renderMessages(chatId) {
      if (!elements.messagesWindow) return;

      const messages = getMessages(chatId);
      if (!messages.length) {
        elements.messagesWindow.innerHTML = '<p class="empty-state">Сообщений пока нет</p>';
        return;
      }

      const byId = {};
      messages.forEach(function (m) { byId[m.id] = m; });

      elements.messagesWindow.innerHTML = messages.map(function (m) {
        const replyBlock = renderReplyQuote(m.replyToId, byId);
        const editedLabel = m.edited ? ' · изменено' : '';

        return (
          '<div class="message ' + (m.fromMe ? 'message--out' : 'message--in') + '">' +
            '<div class="message__bubble">' +
              replyBlock +
              '<p class="message__text">' + escapeHtml(m.text) + '</p>' +
              '<span class="message__time">' + escapeHtml(formatChatTime(m.createdAt)) + editedLabel + '</span>' +
            '</div>' +
            '<button type="button" class="message__menu-btn icon-btn" data-message-menu-id="' + m.id + '" aria-label="Действия с сообщением">' +
              '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>' +
            '</button>' +
          '</div>'
        );
      }).join('');

      elements.messagesWindow.querySelectorAll('.message__menu-btn').forEach(function (btn) {
        btn.addEventListener('click', function (event) {
          event.stopPropagation();
          openMessageMenu(btn.dataset.messageMenuId, btn);
        });
      });

      elements.messagesWindow.scrollTop = elements.messagesWindow.scrollHeight;
    }

    function renderReplyQuote(replyToId, byId) {
      if (!replyToId) return '';
      const original = byId[replyToId];
      const text = original ? original.text : 'Сообщение удалено';
      return '<div class="message__reply">' + escapeHtml(text) + '</div>';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    return {
      init: init,
      getAll: getAll,
      render: render
    };
  })();


  /* ============================================================================
     МОДУЛЬ: Settings
     Настройки приложения. На этом этапе реализована только тема — как
     сквозная демонстрация связки DB ↔ Settings ↔ UI.
     ============================================================================ */

  const Settings = (function () {

    function init() {
      UI.applyTheme(get().theme);
    }

    function get() {
      return DB.load(DB.KEYS.SETTINGS, { theme: 'dark' });
    }

    // Частичное обновление настроек с сохранением в DB
    function update(patch) {
      const next = Object.assign({}, get(), patch);
      DB.save(DB.KEYS.SETTINGS, next);
      return next;
    }

    function toggleTheme() {
      const next = get().theme === 'dark' ? 'light' : 'dark';
      update({ theme: next });
      UI.applyTheme(next);
    }

    return {
      init: init,
      get: get,
      update: update,
      toggleTheme: toggleTheme
    };
  })();


  /* ============================================================================
     МОДУЛЬ: App
     Точка входа. Инициализирует модули в нужном порядке и решает,
     какой экран показать при запуске.
     ============================================================================ */

  const App = (function () {

    function init() {
      DB.init();
      UI.init();
      Settings.init();
      Chats.init();
      Auth.init();

      // Если сессия уже есть — сразу главный интерфейс, иначе экран авторизации
      UI.showScreen(Auth.isAuthenticated() ? 'chats' : 'auth');
    }

    return { init: init };
  })();

  document.addEventListener('DOMContentLoaded', App.init);

})();
</script>
